# Monk CI — Security & Code Quality Scanning
#
# Lives in:  monkci/shield
# Path:      .github/workflows/scan.yml
#
# Triggered via org-level ruleset (required workflow) in customer orgs.
# Each scan job uploads its own SARIF to Monk CI via miglet as a step —
# no separate upload job, no artifact roundtrip.

name: "Monk CI Shield"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

concurrency:
  group: monk-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.21.2"
  TRIVY_VERSION: "0.71.2"
  CHECKOV_VERSION: "3.2.346"

jobs:

  # ─────────────────────────────────────────────────────────
  # Secret Detection — Gitleaks
  # ─────────────────────────────────────────────────────────
  secret-detection:
    name: "Secret Detection"
    runs-on: monkci-ubuntu-24.04-2
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        run: |
          gitleaks detect \
            --source=. \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --report-format=sarif \
            --report-path=gitleaks.sarif \
            --redact \
            --exit-code=1 \
            --verbose \
          && echo "result=pass" >> "$GITHUB_OUTPUT" \
          || echo "result=fail" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to Monk CI
        if: always() && hashFiles('gitleaks.sarif') != ''
        run: |
          /opt/monk-ci/miglet sarif-upload \
            --file=gitleaks.sarif \
            --repo="${{ github.repository }}" \
            --pr="${{ github.event.pull_request.number || 0 }}" \
            --sha="${{ github.event.pull_request.head.sha || github.sha }}" \
            --scan-type=secrets \
            --tool=gitleaks

      - name: Save result
        if: always()
        run: echo "${{ steps.gitleaks.outputs.result || 'error' }}" > /tmp/gitleaks-result.txt

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-result
          path: /tmp/gitleaks-result.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # Code Quality & Security — Semgrep (CLI, no Cloud)
  # ─────────────────────────────────────────────────────────
  code-analysis:
    name: "Code Quality and Security"
    runs-on: monkci-ubuntu-24.04-2
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Detect languages and build config
        id: config
        run: |
          CONFIG="--config=p/default --config=p/security-audit --config=p/secrets"

          if find . -name "*.py" -not -path "*/node_modules/*" -not -path "*/.venv/*" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/python"
          fi
          if find . \( -name "*.js" -o -name "*.ts" -o -name "*.tsx" -o -name "*.jsx" \) -not -path "*/node_modules/*" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/javascript --config=p/typescript"
          fi
          if find . -name "*.go" -not -path "*/vendor/*" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/golang"
          fi
          if find . \( -name "*.java" -o -name "*.kt" \) | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/java"
          fi
          if find . -name "*.rb" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/ruby"
          fi
          if find . -name "*.rs" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/rust"
          fi
          if find . -name "*.php" | head -1 | grep -q .; then
            CONFIG="$CONFIG --config=p/php"
          fi

          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep \
            ${{ steps.config.outputs.config }} \
            --sarif --output=semgrep.sarif \
            --exclude=node_modules --exclude=vendor --exclude=.venv \
            --exclude="*.min.js" --exclude="*generated*" \
            --metrics=off \
          && echo "result=pass" >> "$GITHUB_OUTPUT" \
          || echo "result=fail" >> "$GITHUB_OUTPUT"

          semgrep \
            ${{ steps.config.outputs.config }} \
            --json --output=semgrep.json \
            --exclude=node_modules --exclude=vendor --exclude=.venv \
            --exclude="*.min.js" --exclude="*generated*" \
            --metrics=off || true

          if [ -f semgrep.json ]; then
            ERRORS=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep.json 2>/dev/null || echo "0")
            WARNINGS=$(jq '[.results[] | select(.extra.severity == "WARNING")] | length' semgrep.json 2>/dev/null || echo "0")
            INFOS=$(jq '[.results[] | select(.extra.severity == "INFO")] | length' semgrep.json 2>/dev/null || echo "0")
            echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
            echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
            echo "infos=$INFOS" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to Monk CI
        if: always() && hashFiles('semgrep.sarif') != ''
        run: |
          /opt/monk-ci/miglet sarif-upload \
            --file=semgrep.sarif \
            --repo="${{ github.repository }}" \
            --pr="${{ github.event.pull_request.number || 0 }}" \
            --sha="${{ github.event.pull_request.head.sha || github.sha }}" \
            --scan-type=code \
            --tool=semgrep

      - name: Save result
        if: always()
        run: |
          cat > /tmp/semgrep-result.json << EOF
          {
            "result": "${{ steps.semgrep.outputs.result || 'error' }}",
            "errors": "${{ steps.semgrep.outputs.errors || '0' }}",
            "warnings": "${{ steps.semgrep.outputs.warnings || '0' }}",
            "infos": "${{ steps.semgrep.outputs.infos || '0' }}"
          }
          EOF

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-result
          path: /tmp/semgrep-result.json
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # Dependency Audit — Trivy (CLI install, no marketplace action)
  # ─────────────────────────────────────────────────────────
  dependency-scan:
    name: "Dependency Audit"
    runs-on: monkci-ubuntu-24.04-2
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb" \
            -o trivy.deb
          sudo dpkg -i trivy.deb
          trivy version

      - name: Run Trivy
        id: trivy
        run: |
          trivy fs . \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy.sarif \
          && echo "result=pass" >> "$GITHUB_OUTPUT" \
          || echo "result=fail" >> "$GITHUB_OUTPUT"

      - name: Generate table report
        if: always()
        run: |
          trivy fs . \
            --scanners vuln \
            --severity CRITICAL,HIGH,MEDIUM \
            --format table \
            --output trivy-table.txt || true

      - name: Upload SARIF to Monk CI
        if: always() && hashFiles('trivy.sarif') != ''
        run: |
          /opt/monk-ci/miglet sarif-upload \
            --file=trivy.sarif \
            --repo="${{ github.repository }}" \
            --pr="${{ github.event.pull_request.number || 0 }}" \
            --sha="${{ github.event.pull_request.head.sha || github.sha }}" \
            --scan-type=deps \
            --tool=trivy

      - name: Save result
        if: always()
        run: |
          echo "${{ steps.trivy.outputs.result || 'error' }}" > /tmp/trivy-result.txt
          cp trivy-table.txt /tmp/trivy-table.txt 2>/dev/null || echo "No table output" > /tmp/trivy-table.txt

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-result
          path: |
            /tmp/trivy-result.txt
            /tmp/trivy-table.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # Infrastructure Scan — Checkov (CLI install)
  # ─────────────────────────────────────────────────────────
  iac-scan:
    name: "Infrastructure Scan"
    runs-on: monkci-ubuntu-24.04-2
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for IaC files
        id: detect
        run: |
          HAS_IAC="false"
          if find . -name "*.tf" | head -1 | grep -q .; then HAS_IAC="true"; fi
          if find . -path "*/k8s/*.yml" -o -path "*/k8s/*.yaml" -o -path "*/kubernetes/*.yml" -o -path "*/kubernetes/*.yaml" | head -1 | grep -q .; then HAS_IAC="true"; fi
          if find . -path "*/helm/*.yml" -o -path "*/helm/*.yaml" | head -1 | grep -q .; then HAS_IAC="true"; fi
          if find . -name "Dockerfile" | head -1 | grep -q .; then HAS_IAC="true"; fi
          echo "has_iac=$HAS_IAC" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.detect.outputs.has_iac == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        if: steps.detect.outputs.has_iac == 'true'
        run: pip install checkov==${CHECKOV_VERSION}

      - name: Run Checkov
        if: steps.detect.outputs.has_iac == 'true'
        id: checkov
        run: |
          checkov \
            --directory . \
            --output sarif \
            --output-file-path checkov.sarif \
            --soft-fail \
            --quiet \
            --skip-check CKV_DOCKER_2,CKV_DOCKER_3 \
          && echo "result=pass" >> "$GITHUB_OUTPUT" \
          || echo "result=fail" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to Monk CI
        if: always() && steps.detect.outputs.has_iac == 'true' && hashFiles('checkov.sarif') != ''
        run: |
          /opt/monk-ci/miglet sarif-upload \
            --file=checkov.sarif \
            --repo="${{ github.repository }}" \
            --pr="${{ github.event.pull_request.number || 0 }}" \
            --sha="${{ github.event.pull_request.head.sha || github.sha }}" \
            --scan-type=iac \
            --tool=checkov

      - name: Save result
        if: always()
        run: |
          if [ "${{ steps.detect.outputs.has_iac }}" = "false" ]; then
            echo "skipped" > /tmp/iac-result.txt
          elif [ "${{ steps.checkov.outputs.result }}" = "pass" ]; then
            echo "pass" > /tmp/iac-result.txt
          else
            echo "fail" > /tmp/iac-result.txt
          fi

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-result
          path: /tmp/iac-result.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # PR Summary Comment
  # ─────────────────────────────────────────────────────────
  summary:
    name: "Scan Summary"
    runs-on: monkci-ubuntu-24.04-2
    timeout-minutes: 5
    needs: [secret-detection, code-analysis, dependency-scan, iac-scan]
    if: always()
    steps:
      - name: Download result artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/results
          pattern: "*-result"
          merge-multiple: false
        continue-on-error: true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const readFile = (p) => {
              try { return fs.readFileSync(p, 'utf8').trim(); }
              catch { return 'error'; }
            };
            const readJson = (p) => {
              try { return JSON.parse(fs.readFileSync(p, 'utf8')); }
              catch { return null; }
            };

            const gitleaksResult = readFile('/tmp/results/gitleaks-result/gitleaks-result.txt');
            const semgrepData   = readJson('/tmp/results/semgrep-result/semgrep-result.json');
            const trivyResult   = readFile('/tmp/results/trivy-result/trivy-result.txt');
            const iacResult     = readFile('/tmp/results/iac-result/iac-result.txt');

            const statusLabel = (r) => {
              if (r === 'pass' || r === 'success') return '`PASS`';
              if (r === 'fail' || r === 'failure') return '`FAIL`';
              if (r === 'skipped') return '`SKIPPED`';
              return '`ERROR`';
            };

            const rows = [];

            rows.push(`| ${statusLabel(gitleaksResult)} | **Secret Detection** | ${
              gitleaksResult === 'pass' ? 'No secrets found' :
              gitleaksResult === 'fail' ? 'Potential secrets detected' :
              'Could not complete'} |`);

            if (semgrepData) {
              const detail = semgrepData.result === 'pass'
                ? 'No issues found'
                : `${semgrepData.errors || 0} errors, ${semgrepData.warnings || 0} warnings, ${semgrepData.infos || 0} info`;
              rows.push(`| ${statusLabel(semgrepData.result)} | **Code Quality and Security** | ${detail} |`);
            } else {
              rows.push(`| \`ERROR\` | **Code Quality and Security** | Could not complete |`);
            }

            rows.push(`| ${statusLabel(trivyResult)} | **Dependency Audit** | ${
              trivyResult === 'pass' ? 'No vulnerable dependencies' :
              trivyResult === 'fail' ? 'Vulnerable dependencies found' :
              'Could not complete'} |`);

            if (iacResult === 'skipped') {
              rows.push(`| \`SKIPPED\` | **Infrastructure Scan** | No IaC files detected |`);
            } else {
              rows.push(`| ${statusLabel(iacResult)} | **Infrastructure Scan** | ${
                iacResult === 'pass' ? 'No misconfigurations found' :
                iacResult === 'fail' ? 'Misconfigurations detected' :
                'Could not complete'} |`);
            }

            const hasFailures = [gitleaksResult, semgrepData?.result, trivyResult, iacResult]
              .some(r => r === 'fail' || r === 'failure');

            const logoUrl = 'https://monkci.com/logo.png';
            const dashboardUrl = `https://monkci.com/shield/repos/${encodeURIComponent(context.repo.repo)}`;

            const body = [
              `<picture><img src="${logoUrl}" alt="Monk CI" height="20" align="left" style="margin-right: 8px"></picture>  **Monk CI Shield — Security and Quality Report**`,
              ``,
              `| Status | Check | Details |`,
              `|--------|-------|---------|`,
              ...rows,
              ``,
              hasFailures
                ? `**Issues found.** [View full details on the Monk CI dashboard](${dashboardUrl}).`
                : `**All checks passed.** No issues detected in this pull request.`,
              ``,
              `<sub><a href="https://monkci.com">Monk CI</a> Shield · faster builds with built-in security</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('Monk CI Shield — Security and Quality Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
